<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2027 全栈训练营第一次作业 - 灵犀 AI 对话助手</title>
    <!-- 引入 Tailwind CSS（只能使用相对路径/CDN） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind CDN 配置：启用基于 class 的 dark 模式（Play CDN 支持在脚本之后设置 tailwind.config） -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <!-- 引入 Highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <!-- 引入 Markdown-it 用于解析 Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>
    <!-- 项目自定义样式 -->
    <link rel="stylesheet" href="css/index.css" />
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    <div id="app" class="container mx-auto px-4 flex-grow flex flex-col">
        <!-- 顶部导航栏 -->
        <nav class="py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 rounded bg-gradient-to-r from-purple-500 to-pink-500"></div>
                <span class="font-bold text-xl">灵犀 AI 对话助手</span>
            </div>
            <button id="theme-toggle" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-800">
                <svg id="light-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
                <svg id="dark-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
            </button>
        </nav>

        <!-- 对话区域 -->
        <main id="chat-container" class="flex-grow overflow-y-auto p-4 space-y-6 pb-32">
            <!-- 首页欢迎区 -->
            <section id="welcome-section" class="text-center py-12">
                <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-purple-600 to-pink-500 text-transparent bg-clip-text">嗨，我是灵犀</h1>
                <p class="text-lg text-gray-500 dark:text-gray-400 mb-8">我能帮你做什么？</p>
                <div id="suggestion-cards" class="flex justify-center space-x-4">
                    <div class="suggestion-card bg-white dark:bg-gray-800 p-4 rounded-lg shadow hover:shadow-lg transition cursor-pointer border-l-4 border-indigo-500">
                        <div class="text-indigo-500 mb-2">💡</div>
                        <p>我是一个前端学生，帮我写一个登录页面的代码</p>
                    </div>
                    <div class="suggestion-card bg-white dark:bg-gray-800 p-4 rounded-lg shadow hover:shadow-lg transition cursor-pointer border-l-4 border-green-500">
                        <div class="text-green-500 mb-2">🚀</div>
                        <p>帮我规划一个三天的杭州旅行攻略</p>
                    </div>
                    <div class="suggestion-card bg-white dark:bg-gray-800 p-4 rounded-lg shadow hover:shadow-lg transition cursor-pointer border-l-4 border-yellow-500">
                        <div class="text-yellow-500 mb-2">🎨</div>
                        <p>帮我写一首关于春天的五言绝句</p>
                    </div>
                    <div class="suggestion-card bg-white dark:bg-gray-800 p-4 rounded-lg shadow hover:shadow-lg transition cursor-pointer border-l-4 border-red-500">
                        <div class="text-red-500 mb-2">📱</div>
                        <p>帮我设计一个手机App的界面草图</p>
                    </div>
                </div>
            </section>

            <!-- 消息列表 -->
            <div id="messages" class="space-y-6"></div>
        </main>

        <!-- 底部输入区 -->
        <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4 fixed bottom-0 left-0 right-0">
            <form id="input-form" class="flex flex-col space-y-2">
                <div class="flex items-end space-x-2">
                    <div class="relative flex-grow">
                        <textarea
                            id="input-text"
                            placeholder="输入你的问题..."
                            rows="1"
                            class="w-full pr-8 p-3 rounded-lg border border-gray-300 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none bg-transparent"
                        ></textarea>
                        <!-- 图片上传按钮：右下角回形针图标 -->
                        <label for="upload-image" class="absolute bottom-2 right-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 cursor-pointer">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M18.364 5.636a4.5 4.5 0 0 0-6.364 0L5.636 12a4.5 4.5 0 0 0 6.364 6.364L17 13.364a3 3 0 0 0-4.243-4.243L8.464 13.414" />
                            </svg>
                        </label>
                        <input type="file" id="upload-image" class="hidden" accept="image/*" />
                    </div>
                    <button type="submit" id="send-btn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed hidden">
                        发送
                    </button>
                </div>
                <div id="image-preview" class="hidden mt-2 flex space-x-2"></div>
                <div id="controls" class="flex justify-between items-center text-sm text-gray-500 dark:text-gray-400">
                    <span>快捷键：Enter 发送，Shift+Enter 换行</span>
                    <div class="flex items-center space-x-4">
                        <button type="button" id="stop-generation" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 hidden">
                            停止生成
                        </button>
                        <button type="button" id="clear-chat" class="text-red-500 hover:text-red-600">
                            清除全部对话
                        </button>
                    </div>
                </div>
            </form>
        </footer>
    </div>

    <!-- 业务逻辑脚本 -->
    <script src="js/index.js"></script>
</body>
</html>
